  # Cybersecurity specific recognizers
  - name: CVERecognizer
    type: predefined
    enabled: false
    context: [cve, vulnerability, exploit, security, vulnerabilità, sicurezza]

  - name: CWERecognizer
    type: predefined
    enabled: false
    context: [cwe, weakness, exploit, security, vulnerabilità, sicurezza, debolezza]

  - name: HashRecognizer
    type: predefined
    enabled: false
    context: [hash, md5, sha1, sha256, sha384, sha512]

  - name: PortNumberRecognizer
    type: predefined
    enabled: false
    context: [port, port number, port number, porta, numero]


  # NLP engine recognizers: enable or disable each engine to use it for name entity recognition.
  # Omitting an engine or not specifying the enable field sets the default to true.
  - name: SpacyRecognizer
    type: predefined
    enabled: false
  - name: StanzaRecognizer
    type: predefined
    enabled: false
  - name: TransformersRecognizer
    type: predefined
    enabled: false

  - name: BasicLangExtractRecognizer
    supported_languages:
      - en
      - it
      - es
    type: predefined
    enabled: true
    config_path: presidio_analyzer/conf/langextract_config_basic.yaml
