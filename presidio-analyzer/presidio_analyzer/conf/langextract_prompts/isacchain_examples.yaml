# LangExtract examples — victim / attacked-party scope only.
# Do not extract attacker IOCs, malware/ransomware names, threat actors, CVE/MITRE, etc.

examples:

  # ── PII / PHI ────────────────────────────────────────────────────────────────

  - text: "Il referente è Mario Rossi, raggiungibile a mario.rossi@example.it o al +39 02 1234 5678."
    extractions:
      - extraction_class: "PERSON"
        extraction_text: "Mario Rossi"
        attributes:
          type: "full_name"
      - extraction_class: "EMAIL_ADDRESS"
        extraction_text: "mario.rossi@example.it"
        attributes:
          type: "email_address"
      - extraction_class: "PHONE_NUMBER"
        extraction_text: "+39 02 1234 5678"
        attributes:
          type: "phone_number"
          region: "IT"

  - text: "Dr. Anna Bianchi works at Ospedale San Raffaele in Milan."
    extractions:
      - extraction_class: "PERSON"
        extraction_text: "Dr. Anna Bianchi"
        attributes:
          type: "healthcare_provider"
      - extraction_class: "ORGANIZATION"
        extraction_text: "Ospedale San Raffaele"
        attributes:
          type: "hospital"
      - extraction_class: "LOCATION"
        extraction_text: "Milan"
        attributes:
          type: "city"

  - text: "SSN: 123-45-6789; Data di nascita: 15/03/1985."
    extractions:
      - extraction_class: "US_SSN"
        extraction_text: "123-45-6789"
        attributes:
          type: "us_ssn"
      - extraction_class: "DATE_TIME"
        extraction_text: "15/03/1985"
        attributes:
          type: "date_of_birth"
          format: "DD/MM/YYYY"

  - text: "Payment processed with card 4532-1234-1234-1234 for the invoice."
    extractions:
      - extraction_class: "CREDIT_CARD"
        extraction_text: "4532-1234-1234-1234"
        attributes:
          type: "credit_card_number"

  # ── Victim org + internal context (no malware / threat actor labels) ─────────

  - text: "Incidente INC-2024-0042: compromissione rilevata sul server srv-dc01 alle 03:14 UTC del 2024-11-20; il loader Emotet è stato usato dagli attaccanti."
    extractions:
      - extraction_class: "INCIDENT_ID"
        extraction_text: "INC-2024-0042"
        attributes:
          type: "incident_id"
      - extraction_class: "INTERNAL_SERVER"
        extraction_text: "srv-dc01"
        attributes:
          type: "internal_server"
      - extraction_class: "DATE_TIME"
        extraction_text: "2024-11-20"
        attributes:
          type: "event_date"
          format: "YYYY-MM-DD"

  - text: "Ticket CSIRT-IT-0091: il gruppo Lazarus ha colpito fileserver-prod; nessun pagamento è stato effettuato."
    extractions:
      - extraction_class: "INCIDENT_ID"
        extraction_text: "CSIRT-IT-0091"
        attributes:
          type: "incident_id"
      - extraction_class: "INTERNAL_SERVER"
        extraction_text: "fileserver-prod"
        attributes:
          type: "internal_server"

  - text: "Credential dump sul sistema della vittima: username admin_locale, password P@ssw0rd!2024."
    extractions:
      - extraction_class: "USERNAME"
        extraction_text: "admin_locale"
        attributes:
          type: "username"
      - extraction_class: "PASSWORD"
        extraction_text: "P@ssw0rd!2024"
        attributes:
          type: "plaintext_password"

  - text: "L'analista Luca Ferri (username: l.ferri) ha aperto il ticket INC-2025-0018 alle 09:45."
    extractions:
      - extraction_class: "PERSON"
        extraction_text: "Luca Ferri"
        attributes:
          type: "full_name"
          role: "analyst"
      - extraction_class: "USERNAME"
        extraction_text: "l.ferri"
        attributes:
          type: "username"
      - extraction_class: "INCIDENT_ID"
        extraction_text: "INC-2025-0018"
        attributes:
          type: "incident_id"
      - extraction_class: "DATE_TIME"
        extraction_text: "09:45"
        attributes:
          type: "event_time"
          format: "HH:MM"

  - text: "Traffic from 185.220.101.45 to 192.168.10.20 on port 3389 via RDP; la postazione interna coinvolta era WS-FIN-042."
    extractions:
      - extraction_class: "INTERNAL_SERVER"
        extraction_text: "WS-FIN-042"
        attributes:
          type: "internal_workstation"

  - text: "Acme S.p.A. was listed by LockBit; later, Acme S.p.A. denied payment. LockBit then updated its leak page."
    extractions:
      - extraction_class: "ORGANIZATION"
        extraction_text: "Acme S.p.A."
        attributes:
          type: "company"
      - extraction_class: "ORGANIZATION"
        extraction_text: "Acme S.p.A."
        attributes:
          type: "company"

  # Ransomware brand "Qilin" must not be LOCATION or ORGANIZATION (reads like a place name but is attacker)
  - text: "Contoso Ltd, a Germany-based company, was targeted by the Qilin ransomware operation. No detailed narrative from Qilin specifies the vector. The incident aligns with Qilin's pattern; monitor the Qilin leak site."
    extractions:
      - extraction_class: "ORGANIZATION"
        extraction_text: "Contoso Ltd"
        attributes:
          type: "company"
      - extraction_class: "LOCATION"
        extraction_text: "Germany"
        attributes:
          type: "country"

  - text: "La vittima Banca Italiana SpA ha subito un incidente; CVE-2021-44228 è citato come vettore noto nel settore."
    extractions:
      - extraction_class: "ORGANIZATION"
        extraction_text: "Banca Italiana SpA"
        attributes:
          type: "company"
