# Basic LangExtract Configuration
# Supports different LLM providers via LangExtract's ModelConfig
#
# Required parameters: model_id, provider.name
# Optional parameters use defaults if not specified

lm_recognizer:
  supported_entities:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - US_SSN
    - LOCATION
    - ORGANIZATION
    - DATE_TIME
    - CREDIT_CARD
    - IP_ADDRESS
    - URL
    # Le tue entity custom per cybersecurity
    - INCIDENT_ID
    - MALWARE
    - RANSOMWARE
    - INTERNAL_SERVER
    - THREAT_ACTOR
    - THREAT_GROUP
    - VULNERABILITY
    - CVE
    - CWE
    - HASH_FILE
    - USERNAME
    - PASSWORD
    - PORT_NUMBER
    - PROTOCOL
    - PROCESS_NAME
    - COMMAND
    - MITRE_TECHNIQUE
  
  labels_to_ignore:
    - payment_status
    - metadata
    - annotation
  
  enable_generic_consolidation: true
  min_score: 0.5

langextract:
  prompt_file: "presidio_analyzer/conf/langextract_prompts/isacchain_prompt.j2"
  examples_file: "presidio_analyzer/conf/langextract_prompts/isacchain_examples.yaml"

  model:
    model_id: "qwen/qwen3.5-35b-a3b"
    provider:
      name: "openai"
      kwargs:
        base_url: null
        api_key: null
      extract_params:
        temperature: 0
        use_schema_constraints: false
        fence_output: false
        max_char_buffer: 20000
      language_model_params:
        timeout: 240
        # max_output_tokens: 10000
        # top_p: 0.95
        # top_k: 20
        # min_p: 0.0
        # presence_penalty: 1.5
        # repetition_penalty: 1.0
        extra_body:
          reasoning:
            enabled: false

  entity_mappings:
    # ── PII / PHI (Person / Persona) ─────────────────────────────
    person: PERSON
    persona: PERSON
    name: PERSON
    nome: PERSON
    full_name: PERSON
    nome_completo: PERSON

    # ── PII / PHI (Email / Indirizzo email) ───────────────────────
    email: EMAIL_ADDRESS
    email_address: EMAIL_ADDRESS
    indirizzo_email: EMAIL_ADDRESS
    e_mail: EMAIL_ADDRESS

    # ── PII / PHI (Phone / Telefono) ────────────────────────────
    phone: PHONE_NUMBER
    phone_number: PHONE_NUMBER
    telefono: PHONE_NUMBER
    numero_telefono: PHONE_NUMBER
    cellulare: PHONE_NUMBER
    mobile: PHONE_NUMBER
    telephone: PHONE_NUMBER

    # ── PII / PHI (SSN / Codice fiscale) ─────────────────────────
    ssn: US_SSN
    us_ssn: US_SSN
    social_security_number: US_SSN
    codice_fiscale: US_SSN
    codice_fiscale_italiano: US_SSN

    # ── PII / PHI (Location / Indirizzo) ─────────────────────────
    location: LOCATION
    indirizzo: LOCATION
    address: LOCATION
    street_address: LOCATION
    via: LOCATION
    city: LOCATION
    citta: LOCATION
    città: LOCATION
    paese: LOCATION
    country: LOCATION
    regione: LOCATION
    region: LOCATION

    # ── PII / PHI (Organization / Azienda) ───────────────────────
    organization: ORGANIZATION
    organizzazione: ORGANIZATION
    company: ORGANIZATION
    azienda: ORGANIZATION
    hospital: ORGANIZATION
    ospedale: ORGANIZATION
    ente: ORGANIZATION
    istituzione: ORGANIZATION
    institution: ORGANIZATION

    # ── PII / PHI (Date / Time / Data / Ora) ─────────────────────
    date: DATE_TIME
    date_time: DATE_TIME
    data: DATE_TIME
    time: DATE_TIME
    ora: DATE_TIME
    orario: DATE_TIME
    date_of_birth: DATE_TIME
    data_nascita: DATE_TIME
    birth_date: DATE_TIME

    # ── PII / PHI (Credit card / Carta di credito) ────────────────
    credit_card: CREDIT_CARD
    credit_card_number: CREDIT_CARD
    carta_di_credito: CREDIT_CARD
